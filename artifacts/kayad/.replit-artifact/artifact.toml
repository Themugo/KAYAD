kind = "web"
previewPath = "/"
title = "KAYAD — East Africa's Premier Car Marketplace"
version = "1.0.0"
id = "artifacts/kayad"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23874

[services.development]
run = "pnpm --filter @workspace/kayad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kayad", "run", "build" ]
serve = "static"
publicDir = "artifacts/kayad/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23874"
BASE_PATH = "/"
