# =========================================================
#  GARI MOTORS — Nginx Production Config
#  Place at: /etc/nginx/sites-available/gari-motors
#  Enable:   ln -s /etc/nginx/sites-available/gari-motors /etc/nginx/sites-enabled/
# =========================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream — your Node.js backend
upstream gari_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────
server {
    listen 80;
    server_name garimotors.co.ke www.garimotors.co.ke;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name garimotors.co.ke www.garimotors.co.ke;

    # SSL — use Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/garimotors.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garimotors.co.ke/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";
    add_header Referrer-Policy       strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Frontend (React build output) ──────────────────────
    root /var/www/gari-motors/frontend/dist;
    index index.html;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — send all non-file routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy → Node.js backend ───────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://gari_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        # CORS (backend handles this, but fallback)
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Auth routes — stricter rate limiting
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://gari_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Socket.io WebSocket ────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://gari_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;   # Keep WS alive
        proxy_buffering    off;
    }

    # ── File uploads (if served locally) ──────────────────
    location /uploads/ {
        alias /var/www/gari-motors/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Deny hidden files ──────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
