<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0F1318"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#C8962A" stroke-width="1.5" opacity="0.4"/>
  <!-- Car body -->
  <rect x="10" y="30" width="44" height="16" rx="3" fill="#C8962A"/>
  <!-- Cabin -->
  <path d="M18 30 L22 20 L42 20 L46 30Z" fill="#E8B84B" opacity="0.9"/>
  <!-- Windows -->
  <path d="M24 22 L27 30 L37 30 L40 22Z" fill="#07090C" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="20" cy="46" r="6" fill="#1C2330" stroke="#C8962A" stroke-width="2"/>
  <circle cx="20" cy="46" r="2.5" fill="#C8962A"/>
  <circle cx="44" cy="46" r="6" fill="#1C2330" stroke="#C8962A" stroke-width="2"/>
  <circle cx="44" cy="46" r="2.5" fill="#C8962A"/>
  <!-- Headlight -->
  <rect x="50" y="32" width="4" height="4" rx="1" fill="#FFF9C4" opacity="0.9"/>
  <!-- Speed lines -->
  <line x1="6" y1="35" x2="12" y2="35" stroke="#C8962A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="39" x2="10" y2="39" stroke="#C8962A" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
