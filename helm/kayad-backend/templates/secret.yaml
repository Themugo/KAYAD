apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kayad-backend.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- if .Values.secrets.supabaseUrl }}
  supabase-url: {{ .Values.secrets.supabaseUrl }}
  {{- end }}
  {{- if .Values.secrets.supabaseServiceKey }}
  supabase-service-key: {{ .Values.secrets.supabaseServiceKey }}
  {{- end }}
  {{- if .Values.secrets.redisUrl }}
  redis-url: {{ .Values.secrets.redisUrl }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret }}
  {{- end }}
  {{- if .Values.secrets.sentryDsn }}
  sentry-dsn: {{ .Values.secrets.sentryDsn }}
  {{- end }}
  {{- if .Values.secrets.mpesaConsumerKey }}
  mpesa-consumer-key: {{ .Values.secrets.mpesaConsumerKey }}
  {{- end }}
  {{- if .Values.secrets.mpesaConsumerSecret }}
  mpesa-consumer-secret: {{ .Values.secrets.mpesaConsumerSecret }}
  {{- end }}
  {{- if .Values.secrets.mpesaPasskey }}
  mpesa-passkey: {{ .Values.secrets.mpesaPasskey }}
  {{- end }}
  {{- if .Values.secrets.cloudinaryCloudName }}
  cloudinary-cloud-name: {{ .Values.secrets.cloudinaryCloudName }}
  {{- end }}
  {{- if .Values.secrets.cloudinaryApiKey }}
  cloudinary-api-key: {{ .Values.secrets.cloudinaryApiKey }}
  {{- end }}
  {{- if .Values.secrets.cloudinaryApiSecret }}
  cloudinary-api-secret: {{ .Values.secrets.cloudinaryApiSecret }}
  {{- end }}
  {{- if .Values.secrets.emailSmtpHost }}
  email-smtp-host: {{ .Values.secrets.emailSmtpHost }}
  {{- end }}
  {{- if .Values.secrets.emailSmtpPort }}
  email-smtp-port: {{ .Values.secrets.emailSmtpPort }}
  {{- end }}
  {{- if .Values.secrets.emailSmtpUser }}
  email-smtp-user: {{ .Values.secrets.emailSmtpUser }}
  {{- end }}
  {{- if .Values.secrets.emailSmtpPassword }}
  email-smtp-password: {{ .Values.secrets.emailSmtpPassword }}
  {{- end }}
  {{- if .Values.secrets.smsApiKey }}
  sms-api-key: {{ .Values.secrets.smsApiKey }}
  {{- end }}
  {{- if .Values.secrets.smsApiSecret }}
  sms-api-secret: {{ .Values.secrets.smsApiSecret }}
  {{- end }}
