# Default values for kayad-backend
replicaCount: 3

image:
  repository: kayad-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: api.kayad.space
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - kayad-backend
          topologyKey: kubernetes.io/hostname

env:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  ENABLE_OTEL: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"

secrets:
  supabaseUrl: ""
  supabaseServiceKey: ""
  redisUrl: ""
  jwtSecret: ""
  sentryDsn: ""
  mpesaConsumerKey: ""
  mpesaConsumerSecret: ""
  mpesaPasskey: ""
  cloudinaryCloudName: ""
  cloudinaryApiKey: ""
  cloudinaryApiSecret: ""
  emailSmtpHost: ""
  emailSmtpPort: ""
  emailSmtpUser: ""
  emailSmtpPassword: ""
  smsApiKey: ""
  smsApiSecret: ""

persistence:
  enabled: true
  storageClass: "standard"
  accessMode: "ReadWriteMany"
  size: 50Gi

supabase:
  enabled: true
  url: ""
  serviceKey: ""

redis:
  enabled: true
  host: "redis"
  port: 6379
