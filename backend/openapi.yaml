openapi: 3.0.3
info:
  title: KAYAD API
  description: |
    KAYAD - Kenya's Premium Car Marketplace API
    
    This API provides endpoints for managing car listings, auctions, bids, escrow transactions, and user accounts.
    
    ## Authentication
    
    Most endpoints require authentication using JWT tokens. Include the token in the Authorization header:
    
    `Authorization: Bearer <token>`
    
    ## Rate Limiting
    
    API requests are rate limited. Standard limits are 100 requests per minute per user.
    
    ## Versioning
    
    The API is versioned using URL path versioning (e.g., /api/v1/cars). Current version is v1.
    
    ## Deprecation Policy
    
    Deprecated endpoints will be supported for at least 6 months before removal.
  version: 1.0.0
  contact:
    name: KAYAD API Support
    email: api@kayad.space
    url: https://kayad.space
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.kayad.space/api/v1
    description: Production server
  - url: https://staging-api.kayad.space/api/v1
    description: Staging server
  - url: http://localhost:5000/api/v1
    description: Development server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Cars
    description: Car listing management
  - name: Auctions
    description: Auction management
  - name: Bids
    description: Bid management
  - name: Escrow
    description: Escrow transaction management
  - name: Users
    description: User profile management
  - name: Analytics
    description: Analytics and market data
  - name: Admin
    description: Administrative operations

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: []
      rateLimit:
        window: 15m
        max: 5

  /auth/register:
    post:
      tags:
        - Authentication
      summary: User registration
      description: Register a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: []
      rateLimit:
        window: 1h
        max: 3

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Logout current user session
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Refresh access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security: []

  /cars:
    get:
      tags:
        - Cars
      summary: List cars
      description: Get paginated list of cars with optional filters
      operationId: listCars
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Items per page
        - name: status
          in: query
          schema:
            type: string
            enum: [active, sold, pending, inactive]
          description: Filter by status
        - name: minPrice
          in: query
          schema:
            type: number
          description: Minimum price
        - name: maxPrice
          in: query
          schema:
            type: number
          description: Maximum price
        - name: make
          in: query
          schema:
            type: string
          description: Filter by make
        - name: model
          in: query
          schema:
            type: string
          description: Filter by model
        - name: year
          in: query
          schema:
            type: integer
          description: Filter by year
        - name: location
          in: query
          schema:
            type: string
          description: Filter by location
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, price, mileage, year]
            default: createdAt
          description: Sort field
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
      responses:
        '200':
          description: List of cars
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarListResponse'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 1m
        max: 100

    post:
      tags:
        - Cars
      summary: Create car listing
      description: Create a new car listing
      operationId: createCar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarRequest'
      responses:
        '201':
          description: Car created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - seller account required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 1h
        max: 50

  /cars/{carId}:
    get:
      tags:
        - Cars
      summary: Get car details
      description: Get detailed information about a specific car
      operationId: getCar
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: string
          description: Car ID
      responses:
        '200':
          description: Car details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '404':
          description: Car not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 1m
        max: 100

    put:
      tags:
        - Cars
      summary: Update car listing
      description: Update an existing car listing
      operationId: updateCar
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: string
          description: Car ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCarRequest'
      responses:
        '200':
          description: Car updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Car not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 1h
        max: 50

    delete:
      tags:
        - Cars
      summary: Delete car listing
      description: Delete a car listing
      operationId: deleteCar
      parameters:
        - name: carId
          in: path
          required: true
          schema:
            type: string
          description: Car ID
      responses:
        '200':
          description: Car deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Car not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 1h
        max: 20

  /cars/search:
    get:
