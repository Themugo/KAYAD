        - Analytics
      summary: Get market statistics
      description: Get market-wide statistics and trends
      operationId: getMarketStats
      responses:
        '200':
          description: Market statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketStatsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
        - bearerAuth: []
      rateLimit:
        window: 5m
        max: 10


