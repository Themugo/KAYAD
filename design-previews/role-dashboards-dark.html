<h2 class="sr-only">Kayad — unified dark-theme role dashboards for Superadmin, Admin, Broker, Seller and Buyer</h2>
<style>
:root{
  /* ===== KAYAD DARK THEME (matches src/index.css) ===== */
  --bg:#050505; --surface:#0A0A0A; --card:#111111; --card-hover:#1A1A1A;
  --gold:#D4C4A8; --gold-light:#E8DAC4; --gold-dark:#B89E6F; --gold-muted:#A89878;
  --gold-glow:rgba(212,196,168,0.15); --gold-glow-strong:rgba(212,196,168,0.35);
  --text:#F0EDE6; --text-muted:#8A8A8A; --text-dim:#555555;
  --success:#22C55E; --danger:#EF4444; --warning:#F59E0B; --info:#60A5FA;
  --border:#222222; --border-soft:#333333; --glass:rgba(17,17,17,0.78);
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --radius-sm:8px; --radius:12px; --radius-lg:16px;
}
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body,html{font-family:var(--font-body);font-size:13px;background:#000}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.shell{display:flex;height:780px;max-width:1180px;margin:18px auto;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg);box-shadow:0 20px 60px rgba(0,0,0,.6)}

/* SIDEBAR */
.sb{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb::-webkit-scrollbar{width:6px}.sb::-webkit-scrollbar-thumb{background:var(--border-soft);border-radius:3px}
.brand{padding:18px 15px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-dot{width:32px;height:32px;border-radius:9px;background:linear-gradient(145deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 15px var(--gold-glow)}
.brand-dot span{color:#0A0A0A;font-size:16px;font-weight:700;font-family:var(--font-display);font-style:italic}
.brand-text{font-size:18px;font-weight:700;color:var(--text);line-height:1;font-family:var(--font-display);letter-spacing:.01em}
.brand-sub{font-size:9.5px;color:var(--gold-muted);font-weight:600;margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.ns{padding:14px 14px 5px;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;cursor:pointer;font-size:12.5px;color:var(--text-muted);margin:1px 7px;transition:all .15s;white-space:nowrap;position:relative;font-weight:500}
.ni:hover{background:var(--card);color:var(--text)}
.ni.on{background:var(--gold-glow);color:var(--gold-light);font-weight:600;border:1px solid rgba(212,196,168,.22)}
.ni.on .ni-ic{color:var(--gold)}
.ni-ic{width:15px;height:15px;flex-shrink:0;color:var(--text-dim);transition:color .15s}
.ni-badge{position:absolute;right:10px;background:var(--gold);color:#0A0A0A;font-size:9px;padding:1px 6px;border-radius:999px;font-weight:700}
.ni-badge.red{background:var(--danger);color:#fff}
.ni-badge.live{background:var(--danger);color:#fff;animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.topbar{padding:0 20px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.pg-title{font-size:21px;font-weight:600;color:var(--text);font-family:var(--font-display);letter-spacing:.01em}
.topbar-r{display:flex;align-items:center;gap:12px}
.role-switch{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px}
.role-pill{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap}
.role-pill:hover{color:var(--text)}
.role-pill.on{background:linear-gradient(145deg,var(--gold),var(--gold-dark));color:#0A0A0A}
.av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--card);color:var(--gold);border:1px solid var(--border-soft)}
.content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.content::-webkit-scrollbar{width:8px}.content::-webkit-scrollbar-thumb{background:var(--border-soft);border-radius:4px}

/* BUTTONS / BADGES */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;border:1px solid var(--border-soft);background:transparent;color:var(--text);font-family:var(--font-body);font-weight:600;white-space:nowrap;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.btn-p{background:linear-gradient(145deg,var(--gold),var(--gold-dark));color:#0A0A0A;border:none;box-shadow:0 4px 15px var(--gold-glow)}.btn-p:hover{box-shadow:0 8px 24px var(--gold-glow-strong);color:#0A0A0A}
.btn-sm{padding:5px 11px;font-size:11px}.btn-xs{padding:4px 9px;font-size:10.5px;border-radius:8px}
.bx{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:700;white-space:nowrap;border:1px solid}
.bx-live{background:rgba(239,68,68,.16);color:#fca5a5;border-color:rgba(239,68,68,.3)}
.bx-active{background:rgba(34,197,94,.16);color:#86efac;border-color:rgba(34,197,94,.3)}
.bx-draft{background:rgba(255,255,255,.05);color:var(--text-muted);border-color:var(--border-soft)}
.bx-sold{background:var(--gold-glow);color:var(--gold-light);border-color:rgba(212,196,168,.3)}
.bx-pending{background:rgba(245,158,11,.16);color:#fcd34d;border-color:rgba(245,158,11,.3)}
.bx-blue{background:rgba(96,165,250,.16);color:#93c5fd;border-color:rgba(96,165,250,.3)}
.dotpulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.card-t{font-size:16px;font-weight:600;color:var(--text);font-family:var(--font-display);letter-spacing:.01em}
.card-sub{font-size:11px;color:var(--text-dim);font-weight:500}
.card-bd{padding:18px}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:15px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:17px 18px;position:relative;overflow:hidden;transition:all .2s}
.sc:hover{border-color:rgba(212,196,168,.3);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.sc-deco{position:absolute;right:-20px;top:-20px;width:72px;height:72px;border-radius:50%;opacity:.12}
.sc-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:13px}
.sl{font-size:9.5px;color:var(--text-dim);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sv{font-size:28px;font-weight:700;color:var(--text);line-height:1;font-family:var(--font-display);font-style:italic;letter-spacing:-.01em}
.ss{font-size:10.5px;color:var(--text-muted);margin-top:9px;display:flex;align-items:center;gap:5px;padding-top:9px;border-top:1px solid var(--border)}
.trend-up{color:var(--success);font-weight:700}.trend-down{color:var(--danger);font-weight:700}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 16px;font-size:9.5px;font-weight:700;color:var(--text-dim);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.cr:hover td{background:var(--card-hover);cursor:pointer}
.car-cell{display:flex;align-items:center;gap:12px}
.car-thumb{width:50px;height:37px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface);border:1px solid var(--border)}
.car-name{font-weight:600;font-size:12.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.car-sub{font-size:10.5px;color:var(--text-dim);margin-top:1px}
.kes{font-family:var(--font-mono);font-weight:500;font-size:11.5px}

/* PROGRESS / TIMELINE */
.prog{height:6px;background:var(--surface);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width .4s}
.glance-row{cursor:pointer}.glance-row:hover .glance-name{color:var(--gold)}
.timeline-item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;box-shadow:0 0 8px currentColor}
.dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.dr:last-child{border-bottom:none}
.dk{color:var(--text-muted)}.dv{font-weight:700;text-align:right;color:var(--text)}

/* QUICK ACTIONS */
.qa{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface)}
.qa:hover{border-color:rgba(212,196,168,.3);background:var(--gold-glow)}
.qa-ic{width:32px;height:32px;border-radius:9px;background:var(--gold-glow);color:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qa-t{font-size:12px;font-weight:700;color:var(--text)}
.qa-s{font-size:10.5px;color:var(--text-dim);margin-top:1px}
.health{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.health:last-child{border-bottom:none}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
</style>

<div class="shell" id="shell">
  <div class="sb">
    <div class="brand">
      <div class="brand-dot"><span>K</span></div>
      <div><div class="brand-text">Kayad</div><div class="brand-sub" id="role-sub">Platform Owner</div></div>
    </div>
    <div id="nav"></div>
    <div style="flex:1"></div>
    <div style="padding:14px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="av" id="side-av">JM</div>
        <div style="min-width:0">
          <div id="side-name" style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Jimmy Mugo</div>
          <div id="side-role" style="font-size:10px;color:var(--text-dim)">Superadmin</div>
        </div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="pg-title" id="pg-title">Dashboard</div>
      <div class="topbar-r">
        <div class="role-switch" id="role-switch">
          <div class="role-pill on" data-r="super">Superadmin</div>
          <div class="role-pill" data-r="admin">Admin</div>
          <div class="role-pill" data-r="broker">Broker</div>
          <div class="role-pill" data-r="seller">Seller</div>
          <div class="role-pill" data-r="buyer">Buyer</div>
        </div>
        <div class="av" id="top-av">JM</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const TH="https://images.unsplash.com/";
const car=(n,y,p,img)=>({n,y,p,img:TH+img+'?w=120&h=90&fit=crop'});
const CARS=[
  car('Toyota Land Cruiser V8',2021,8500000,'photo-1503376780353-7e8f0e4b39f4'),
  car('Mercedes-Benz GLE 350d',2022,12000000,'photo-1618843479313-40f8afb4b4d1'),
  car('BMW X5 M Sport',2020,6200000,'photo-1555215695-3004980ad54e'),
  car('Range Rover Sport HSE',2020,15000000,'photo-1606664515524-ed2f786a0bd6'),
  car('Lexus ES 350',2022,5200000,'photo-1511919886926-f7fb7d0c6e2c'),
  car('Mazda CX-5 Grand Touring',2023,4200000,'photo-1552519507-da3b142c6e3d'),
];
const fmt=n=>'KES '+Math.round(n).toLocaleString();
const fmtM=n=>'KES '+(n/1000000).toFixed(1)+'M';
const ini=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const MONTHS=['Dec','Jan','Feb','Mar','Apr','May'];
const GOLD='#D4C4A8';

function statCard({label,value,sub,trend,color,icon}){
  return `<div class="sc">
    <div class="sc-deco" style="background:${color}"></div>
    <div class="sc-ic" style="background:${color}22;color:${color}">${icon}</div>
    <div class="sl">${label}</div>
    <div class="sv">${value}</div>
    <div class="ss">${trend?`<span class="${trend.dir==='up'?'trend-up':'trend-down'}">${trend.dir==='up'?'↑':'↓'} ${trend.val}</span> `:''}${sub}</div>
  </div>`;
}
function timeline(items){
  return `<div style="padding:5px 18px 10px">${items.map(a=>`<div class="timeline-item">
    <div class="tl-dot" style="background:${a.c};color:${a.c}"></div>
    <div style="flex:1;font-size:12px;line-height:1.45;color:var(--text-muted)">${a.msg}</div>
    <div style="font-size:10.5px;color:var(--text-dim);white-space:nowrap">${a.t}</div>
  </div>`).join('')}</div>`;
}
function glance(rows){
  const total=rows.reduce((s,r)=>s+r.n,0);
  return `<div class="card-bd" style="display:flex;flex-direction:column;gap:14px">${rows.map(r=>{
    const pct=Math.round(r.n/total*100);
    return `<div class="glance-row"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
      <span class="glance-name" style="font-weight:600;color:var(--text)">${r.name}</span><span style="color:var(--text-muted)">${r.label||r.n} · ${pct}%</span></div>
      <div class="prog"><div class="pf" style="width:${pct}%;${r.color?'background:'+r.color:''}"></div></div></div>`;
  }).join('')}</div>`;
}
function qa(items){
  return `<div class="card-bd" style="display:flex;flex-direction:column;gap:10px">${items.map(i=>`<div class="qa">
    <div class="qa-ic">${i.icon}</div><div><div class="qa-t">${i.t}</div><div class="qa-s">${i.s}</div></div></div>`).join('')}</div>`;
}
const IC={
  money:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v12M3.5 3.5h5a1.8 1.8 0 010 3.6h-3a1.8 1.8 0 000 3.6h5"/></svg>',
  car:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8l1.2-3.2A2 2 0 014.6 3.5h4.8a2 2 0 011.9 1.3L12.5 8M1.5 8h11v3h-11z"/><circle cx="3.8" cy="9" r=".7" fill="currentColor"/><circle cx="10.2" cy="9" r=".7" fill="currentColor"/></svg>',
  users:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="4.5" r="2.3"/><path d="M1.2 12c0-2.4 1.7-3.8 3.8-3.8s3.8 1.4 3.8 3.8"/><circle cx="10.5" cy="6.5" r="1.8"/><path d="M12.8 12c0-1.5-1-2.6-2.3-2.6"/></svg>',
  gavel:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="2.5"/><path d="M7 1v2M7 11v2M1 7h2M11 7h2"/></svg>',
  bolt:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2L5 8h3l-1 4 4-6H8z"/></svg>',
  doc:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="2.5" width="11" height="9" rx="1.5"/><path d="M1.5 5.5h11"/></svg>',
  heart:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 12C7 12 1.5 8.5 1.5 4.8 1.5 3 3 2 4.3 2 5.5 2 7 3.2 7 3.2S8.5 2 9.7 2C11 2 12.5 3 12.5 4.8 12.5 8.5 7 12 7 12z"/></svg>',
  shield:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1.5l4.5 1.8v3.4c0 3-2 4.8-4.5 5.8C4.5 11.5 2.5 9.7 2.5 6.7V3.3z"/></svg>',
  bag:'<svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5h8l-.7 7.5H3.7zM5 4.5V3a2 2 0 014 0v1.5"/></svg>',
};

const ROLES = {
super:{
  sub:'Platform Owner', name:'Jimmy Mugo', role:'Superadmin', av:'JM',
  nav:[
    {g:'Overview', items:[['dash','Dashboard']]},
    {g:'Platform', items:[['users','Users','2,841'],['dealers','Dealers','64'],['staff','Staff']]},
    {g:'Operations', items:[['auctions','Auctions','7'],['escrows','Escrows'],['transactions','Transactions']]},
    {g:'Control', items:[['control','Control Room'],['security','Security Log','3','red'],['settings','Settings']]},
  ],
  dash(){
    return `
    <div class="sg">
      ${statCard({label:'Platform GMV',value:fmtM(284000000),sub:'all-time volume',trend:{dir:'up',val:'18%'},color:'#22C55E',icon:IC.money})}
      ${statCard({label:'Commission (May)',value:fmtM(4200000),sub:'platform revenue',trend:{dir:'up',val:'22%'},color:GOLD,icon:IC.money})}
      ${statCard({label:'Total users',value:'2,841',sub:'+184 this month',trend:{dir:'up',val:'7%'},color:'#60A5FA',icon:IC.users})}
      ${statCard({label:'Active dealers',value:'64',sub:'12 pending approval',color:'#A78BFA',icon:IC.car})}
    </div>
    <div style="display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:15px;margin-bottom:15px">
      <div class="card"><div class="card-hd"><div><span class="card-t">Platform commission</span><div class="card-sub">Last 6 months · KES millions</div></div><span class="bx bx-active">+22% MoM</span></div>
        <div style="padding:16px 16px 10px;position:relative;height:190px"><canvas id="ch"></canvas></div></div>
      <div class="card"><div class="card-hd"><span class="card-t">System health</span><span class="bx bx-active"><span class="dotpulse"></span>All systems go</span></div>
        <div class="card-bd">
          ${[['API','#22C55E','99.98% uptime'],['Database','#22C55E','Healthy · 42ms'],['M-Pesa gateway','#22C55E','Connected'],['Redis cache','#22C55E','Connected'],['Auction engine','#22C55E','Running · 7 live']].map(([n,c,s])=>`<div class="health"><div class="hdot" style="background:${c};color:${c}"></div><span style="font-weight:600;flex:1;color:var(--text)">${n}</span><span style="color:var(--text-dim);font-size:11px">${s}</span></div>`).join('')}
        </div></div>
    </div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:15px;margin-bottom:15px">
      <div class="card"><div class="card-hd"><span class="card-t">Platform activity</span></div>
        ${timeline([
          {c:'#22C55E',msg:'Dealer <b style="color:var(--text)">Prestige Motors</b> sold KES 14.2M Range Rover',t:'12m ago'},
          {c:GOLD,msg:'Commission KES 142K credited to platform',t:'12m ago'},
          {c:'#60A5FA',msg:'New dealer <b style="color:var(--text)">Auto Hub Ltd</b> registered',t:'1h ago'},
          {c:'#EF4444',msg:'Security: failed login burst flagged & blocked',t:'2h ago'},
          {c:'#A78BFA',msg:'Escrow KES 9.8M released to seller',t:'3h ago'},
        ])}</div>
      <div class="card"><div class="card-hd"><span class="card-t">Users by role</span><span class="card-sub">2,841 total</span></div>
        ${glance([{name:'Buyers',n:2380,color:'#60A5FA'},{name:'Dealers',n:64,color:GOLD},{name:'Brokers',n:128,color:'#A78BFA'},{name:'Sellers',n:251,color:'#22C55E'},{name:'Staff',n:18,color:'#EF4444'}])}</div>

let CURR='super', PAGE='dash';
function renderNav(){
  const r=ROLES[CURR];
  document.getElementById('nav').innerHTML=r.nav.map(sec=>`
    <div class="ns">${sec.g}</div>
    ${sec.items.map(it=>{const [p,label,badge,cls]=it;
      return `<div class="ni ${p===PAGE?'on':''}" data-p="${p}">
        <svg class="ni-ic" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
        ${label}${badge?`<span class="ni-badge ${cls||''}">${badge}</span>`:''}</div>`;
    }).join('')}`).join('');
}
function switchRole(r){
  CURR=r; PAGE='dash'; const cfg=ROLES[r];
  document.getElementById('role-sub').textContent=cfg.sub;
  document.getElementById('side-name').textContent=cfg.name;
  document.getElementById('side-role').textContent=cfg.role;
  document.getElementById('side-av').textContent=cfg.av;
  document.getElementById('top-av').textContent=cfg.av;
  document.querySelectorAll('.role-pill').forEach(p=>p.classList.toggle('on',p.dataset.r===r));
  renderNav(); render();
}
function go(p){ PAGE=p; renderNav(); render(); }
function render(){
  const r=ROLES[CURR];
  document.getElementById('pg-title').textContent = PAGE==='dash'?'Dashboard':PAGE.charAt(0).toUpperCase()+PAGE.slice(1);
  const c=document.getElementById('content');
  if(PAGE==='dash'){ c.innerHTML=r.dash(); if(r.chart) setTimeout(()=>drawChart(r.chart),50); }
  else { c.innerHTML=`<div class="card"><div class="card-hd"><span class="card-t">${PAGE.charAt(0).toUpperCase()+PAGE.slice(1)}</span></div><div style="padding:52px;text-align:center;color:var(--text-dim)">The <b style="color:var(--gold)">${PAGE}</b> view for the ${r.role} role reuses the same card, table and stat patterns shown on the dashboard.</div></div>`; }
}
function drawChart(cfg){
  const el=document.getElementById('ch'); if(!el||!window.Chart) return;
  const isLine=cfg.type==='line';
  new Chart(el,{type:cfg.type,
    data:{labels:MONTHS,datasets:[{data:cfg.data,backgroundColor:isLine?'rgba(212,196,168,.14)':GOLD,borderColor:GOLD,borderRadius:6,barThickness:26,fill:isLine,tension:.4,borderWidth:2,pointRadius:3,pointBackgroundColor:GOLD}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(cfg.label==='M'?'KES '+c.parsed.y+'M':cfg.label==='K'?'KES '+c.parsed.y+'K':c.parsed.y)}}},
    scales:{y:{beginAtZero:true,grid:{color:'#1a1a1a'},ticks:{font:{size:10},color:'#555',callback:v=>cfg.label?v+cfg.label:v}},x:{grid:{display:false},ticks:{font:{size:11,weight:600},color:'#8A8A8A'}}}}});
}
document.getElementById('role-switch').addEventListener('click',e=>{const p=e.target.closest('[data-r]'); if(p) switchRole(p.dataset.r);});
document.getElementById('shell').addEventListener('click',e=>{const n=e.target.closest('[data-p]'); if(n) go(n.dataset.p);});
switchRole('super');
</script>
