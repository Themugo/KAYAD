# Benefits:
# - Gradual rollout reduces risk
# - Early detection of issues
# - Easy rollback capability
# - A/B testing capability
# - Resource efficient (small canary initially)

# Considerations:
# - Requires service mesh or advanced ingress for traffic splitting
# - More complex deployment process
# - Requires monitoring and automated rollback
# - Database schema changes must be backward compatible
# - Longer deployment time due to gradual rollout

# Canary Best Practices:
# - Start with small traffic percentage (1-5%)
# - Monitor key metrics (error rate, latency, conversion)
# - Set up automated rollback triggers
# - Use feature flags for canary-specific functionality
# - Test canary with internal users first
# - Document canary success criteria
# - Have clear rollback procedures

# Canary Success Criteria:
# - Error rate < 0.1%
# - P95 latency < 200ms
- # Conversion rate >= stable version
# - No critical bugs reported
# - Resource utilization within limits
