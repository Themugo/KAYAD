# Canary Release Strategy
# This strategy gradually rolls out new versions to a subset of users
# Traffic is split between stable and canary deployments

---
# Stable Deployment (Current Production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kayad-backend-stable
  namespace: kayad
  labels:
    app: kayad-backend
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kayad-backend
      track: stable
  template:
    metadata:
      labels:
        app: kayad-backend
        track: stable
        version: v1
    spec:
      containers:
      - name: kayad-backend
        image: kayad-backend:v1
        ports:
        - containerPort: 5000
        # ... rest of container configuration

---
# Canary Deployment (New Version)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kayad-backend-canary
  namespace: kayad
  labels:
    app: kayad-backend
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kayad-backend
      track: canary
  template:
    metadata:
      labels:
        app: kayad-backend
        track: canary
        version: v2
    spec:
      containers:
      - name: kayad-backend
        image: kayad-backend:v2
        ports:
        - containerPort: 5000
        # ... rest of container configuration

---
# Stable Service
apiVersion: v1
kind: Service
metadata:
  name: kayad-backend-stable
  namespace: kayad
  labels:
    app: kayad-backend
    track: stable
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: kayad-backend
    track: stable

---
# Canary Service
apiVersion: v1
kind: Service
metadata:
  name: kayad-backend-canary
  namespace: kayad
  labels:
    app: kayad-backend
    track: canary
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: kayad-backend
    track: canary

---
# Main Service with Traffic Splitting (using Istio or similar)
# Note: This requires a service mesh like Istio for advanced traffic splitting
# For basic canary without service mesh, use weighted services or ingress rules

---
# Canary Deployment Process:
# 1. Deploy canary with new version (1 replica initially)
# 2. Route 5% of traffic to canary
# 3. Monitor canary for errors and performance
# 4. Gradually increase traffic to canary (10%, 25%, 50%, 75%, 100%)
# 5. If issues detected, rollback by reducing canary traffic to 0%
# 6. If canary is stable, promote canary to stable
# 7. Scale down old stable deployment

