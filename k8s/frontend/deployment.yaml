apiVersion: apps/v1
kind: Deployment
metadata:
  name: kayad-frontend
  namespace: kayad
  labels:
    app: kayad-frontend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kayad-frontend
  template:
    metadata:
      labels:
        app: kayad-frontend
        version: v1
    spec:
      containers:
      - name: kayad-frontend
        image: kayad-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: VITE_API_URL
          value: "https://api.kayad.space"
        - name: VITE_SOCKET_URL
          value: "wss://api.kayad.space"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
