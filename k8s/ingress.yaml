apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kayad-ingress
  namespace: kayad
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://kayad.space,https://www.kayad.space"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Idempotency-Key"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
  - hosts:
    - kayad.space
    - www.kayad.space
    - api.kayad.space
    secretName: kayad-tls
  rules:
  - host: kayad.space
    http:
      paths:
      - path: /?(.*)
        pathType: Prefix
        backend:
          service:
            name: kayad-frontend
            port:
              number: 80
  - host: www.kayad.space
    http:
      paths:
      - path: /?(.*)
        pathType: Prefix
        backend:
          service:
            name: kayad-frontend
            port:
              number: 80
  - host: api.kayad.space
    http:
      paths:
      - path: /?(.*)
        pathType: Prefix
        backend:
          service:
            name: kayad-backend
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kayad-webhook-ingress
  namespace: kayad
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  tls:
  - hosts:
    - webhooks.kayad.space
    secretName: kayad-webhook-tls
  rules:
  - host: webhooks.kayad.space
    http:
      paths:
      - path: /mpesa/callback
        pathType: Prefix
        backend:
          service:
            name: kayad-backend
            port:
              number: 80
