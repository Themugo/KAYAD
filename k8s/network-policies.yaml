apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kayad-backend-netpol
  namespace: kayad
  labels:
    app: kayad-backend
spec:
  podSelector:
    matchLabels:
      app: kayad-backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from frontend
  - from:
    - podSelector:
        matchLabels:
          app: kayad-frontend
    ports:
    - protocol: TCP
      port: 5000
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
  egress:
  # Allow egress to MongoDB
  - to:
    - podSelector:
        matchLabels:
          app: mongodb
    ports:
    - protocol: TCP
      port: 27017
  # Allow egress to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow egress to external APIs (M-Pesa, Cloudinary, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kayad-frontend-netpol
  namespace: kayad
  labels:
    app: kayad-frontend
spec:
  podSelector:
    matchLabels:
      app: kayad-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow egress to backend
  - to:
    - podSelector:
        matchLabels:
          app: kayad-backend
    ports:
    - protocol: TCP
      port: 5000
  # Allow egress to external APIs
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kayad-deny-all
  namespace: kayad
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  # Deny all ingress by default (whitelist approach)
  - {}
