apiVersion: v1
kind: Secret
metadata:
  name: kayad-secrets
  namespace: kayad
type: Opaque
stringData:
  # Database (Supabase)
  supabase-url: "https://your-project.supabase.co"
  supabase-service-key: "CHANGE_THIS"
  redis-url: "redis://redis:6379"
  
  # Authentication
  jwt-secret: "CHANGE_THIS_IN_PRODUCTION_MINIMUM_32_CHARACTERS"
  
  # Monitoring
  sentry-dsn: ""
  
  # M-Pesa
  mpesa-consumer-key: "CHANGE_THIS"
  mpesa-consumer-secret: "CHANGE_THIS"
  mpesa-passkey: "CHANGE_THIS"
  
  # Cloudinary
  cloudinary-cloud-name: "CHANGE_THIS"
  cloudinary-api-key: "CHANGE_THIS"
  cloudinary-api-secret: "CHANGE_THIS"
  
  # Email
  email-smtp-host: "smtp.gmail.com"
  email-smtp-port: "587"
  email-smtp-user: "CHANGE_THIS"
  email-smtp-password: "CHANGE_THIS"
  
  # SMS
  sms-api-key: "CHANGE_THIS"
  sms-api-secret: "CHANGE_THIS"
