# docker-compose.yml — Full Kayad stack
# Usage: docker compose up -d
# Requires: .env file in root with MONGO_URI, MPESA_*, CLOUDINARY_*, JWT_SECRET

version: "3.9"

services:

  # ── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kayad-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - kayad-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (served by nginx) ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: kayad-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/ssl/certs:ro          # SSL certificates (create ssl/ dir if needed)
    networks:
      - kayad-net

  # ── MongoDB (local dev only) ─────────────────────────────
  # For production, use MongoDB Atlas instead — remove this service
  mongo:
    image: mongo:7
    container_name: kayad-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kayad
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-kayad_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD must be set}
    volumes:
      - mongo-data:/data/db
    networks:
      - kayad-net

volumes:
  mongo-data:

networks:
  kayad-net:
    driver: bridge
