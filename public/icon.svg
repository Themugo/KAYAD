<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A853"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="#0A1628"/>
  <g transform="translate(256,280)">
    <!-- car body -->
    <path d="M-180,0 L-160,-50 Q-150,-70 -130,-70 L-80,-70 L-40,-100 Q-20,-120 10,-120 L130,-120 Q160,-120 170,-100 L200,-60 Q220,-50 220,-30 L220,0 Q220,10 210,10 L-210,10 Q-220,10 -220,0 Q-220,-10 -210,-10 L-200,-10 Z" fill="url(#g)"/>
    <!-- windows -->
    <path d="M-70,-70 L-35,-105 Q-20,-115 0,-115 L110,-115 Q125,-115 130,-105 L165,-70 Z" fill="#0A1628" opacity="0.85"/>
    <path d="M-75,-70 L-45,-95 L-68,-70 Z" fill="#0A1628" opacity="0.85"/>
    <!-- left wheel -->
    <circle cx="-110" cy="15" r="45" fill="#1a1a2e" stroke="#D4A853" stroke-width="6"/>
    <circle cx="-110" cy="15" r="20" fill="#D4A853"/>
    <!-- right wheel -->
    <circle cx="130" cy="15" r="45" fill="#1a1a2e" stroke="#D4A853" stroke-width="6"/>
    <circle cx="130" cy="15" r="20" fill="#D4A853"/>
    <!-- headlight -->
    <rect x="195" y="-55" width="25" height="20" rx="4" fill="#FFE44D" opacity="0.9"/>
    <!-- taillight -->
    <rect x="-220" y="-50" width="20" height="18" rx="4" fill="#FF4444" opacity="0.8"/>
  </g>
</svg>
