# Docker Compose for MongoDB Replica Set
# ─────────────────────────────────────────────────────────────
# This configuration sets up a 3-node MongoDB replica set
# for high availability and automatic failover
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:
  mongodb-primary:
    image: mongo:7.0
    container_name: kayad-mongo-primary
    ports:
      - "27017:27017"
    volumes:
      - mongodb-primary-data:/data/db
      - mongodb-primary-config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    command: mongod --replSet kayadReplicaSet --bind_ip_all
    networks:
      - kayad-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-secondary1:
    image: mongo:7.0
    container_name: kayad-mongo-secondary1
    ports:
      - "27018:27017"
    volumes:
      - mongodb-secondary1-data:/data/db
      - mongodb-secondary1-config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    command: mongod --replSet kayadReplicaSet --bind_ip_all
    networks:
      - kayad-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-secondary2:
    image: mongo:7.0
    container_name: kayad-mongo-secondary2
    ports:
      - "27019:27017"
    volumes:
      - mongodb-secondary2-data:/data/db
      - mongodb-secondary2-config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    command: mongod --replSet kayadReplicaSet --bind_ip_all
    networks:
      - kayad-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kayad-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - kayad-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kayad-backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb-primary:
        condition: service_healthy
      mongodb-secondary1:
        condition: service_healthy
      mongodb-secondary2:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD:-password}@mongodb-primary:27017,mongodb-secondary1:27017,mongodb-secondary2:27017/kayad?replicaSet=kayadReplicaSet&authSource=admin
      MONGO_REPLICA_SET_NAME: kayadReplicaSet
      MONGO_READ_PREFERENCE: secondaryPreferred
      MONGO_WRITE_CONCERN_W: majority
      MONGO_WRITE_CONCERN_J: true
      MONGO_MAX_POOL_SIZE: 100
      MONGO_MIN_POOL_SIZE: 10
      REDIS_URL: redis://redis:6379
    networks:
      - kayad-network
    restart: unless-stopped

volumes:
  mongodb-primary-data:
  mongodb-primary-config:
  mongodb-secondary1-data:
  mongodb-secondary1-config:
  mongodb-secondary2-data:
  mongodb-secondary2-config:
  redis-data:

networks:
  kayad-network:
    driver: bridge
