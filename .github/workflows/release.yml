name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION//v/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, showing all commits"
            git log --pretty=format:"- %s (%h)" --no-merges > changelog.txt
          else
            echo "Generating changelog from $PREV_TAG to ${{ steps.get_version.outputs.version }}"
            git log $PREV_TAG..${{ steps.get_version.outputs.version }} --pretty=format:"- %s (%h)" --no-merges > changelog.txt
          fi
          
          # Count commits
          COMMIT_COUNT=$(wc -l < changelog.txt)
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          
          # Display changelog
          echo "Changelog:"
          cat changelog.txt

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## 🚀 Release ${{ steps.get_version.outputs.version }}
            
            ### Changes
            
            ${{ steps.changelog.outputs.commit_count }} commits since last release:
            
            ```
            $(cat changelog.txt)
            ```
            
            ### Installation
            
            ```bash
            # Clone repository
            git clone https://github.com/Themugo/KAYAD.git
            cd KAYAD
            
            # Checkout this version
            git checkout ${{ steps.get_version.outputs.version }}
            
            # Install dependencies
            npm install
            cd backend && npm install
            ```
            
            ### Deployment
            
            See [DEPLOYMENT_GUIDE.md](https://github.com/Themugo/KAYAD/blob/master/DEPLOYMENT_GUIDE.md) for deployment instructions.
            
            ### Documentation
            
            - [README](https://github.com/Themugo/KAYAD/blob/master/README.md)
            - [Deployment Guide](https://github.com/Themugo/KAYAD/blob/master/DEPLOYMENT_GUIDE.md)
            - [API Guide](https://github.com/Themugo/KAYAD/blob/master/API_GUIDE.md)
            
            ---
            
            **Full Changelog**: https://github.com/Themugo/KAYAD/compare/${{ steps.changelog.outputs.prev_tag }}...${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

  notify-team:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Send notification
        run: |
          echo "Release ${{ steps.get_version.outputs.version }} created successfully!"
          echo "Notify team via Slack/Email (configure integration)"
