name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Daily security scan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # GitHub CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, typescript
          queries: security-extended, security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # Gitleaks Secret Detection
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          report-format: sarif
          report-path: gitleaks-report.sarif
          upload-report: true
          fail-on-severity: critical

  # Trivy Container Scanning
  trivy:
    name: Trivy Container Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t kayad-backend:latest -f backend/Dockerfile backend/
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'kayad-backend:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          scanners: 'vuln'
          vuln-type: 'os,library'
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

  # SBOM Generation
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CycloneDX
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate SBOM for backend
        run: |
          cd backend
          npm ci
          cyclonedx-npm --output-file ../backend-sbom.json
          
      - name: Generate SBOM for frontend
        run: |
          npm ci
          cyclonedx-npm --output-file frontend-sbom.json
          
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            backend-sbom.json
            frontend-sbom.json
          retention-days: 90

  # Dependency License Checks
  license-check:
    name: Dependency License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install license-checker
        run: npm install -g license-checker
        
      - name: Check backend licenses
        run: |
          cd backend
          license-checker --production --json > backend-licenses.json || true
          license-checker --production --failOn "AGPL;SSPL;CPAL;CPL;EPL" || echo "License check completed"
          
      - name: Check frontend licenses
        run: |
          license-checker --production --json > frontend-licenses.json || true
          license-checker --production --failOn "AGPL;SSPL;CPAL;CPL;EPL" || echo "License check completed"
          
      - name: Upload license reports
        uses: actions/upload-artifact@v4
        with:
          name: license-reports
          path: |
            backend/backend-licenses.json
            frontend-licenses.json
          retention-days: 90

  # OWASP Dependency Check
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.7.0
        with:
          project: 'kayad'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'
          suppressionFile: '.github/dependency-check-suppressions.xml'
          
      - name: Run OWASP Dependency Check (SARIF)
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@1.7.0
        with:
          project: 'kayad'
          path: '.'
          format: 'SARIF'
          out: 'dependency-check-report-sarif'
          suppressionFile: '.github/dependency-check-suppressions.xml'
          
      - name: Upload Dependency Check report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            dependency-check-report
            dependency-check-report-sarif
          retention-days: 90
          
      - name: Upload Dependency Check results to GitHub Security
        if: hashFiles('dependency-check-report-sarif/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'dependency-check-report-sarif/dependency-check-report.sarif'
          category: 'owasp-dependency-check'

  # NPM Audit Gating
  npm-audit-gating:
    name: NPM Audit Gating
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Run npm audit (root)
        run: npm audit --audit-level=high
        working-directory: .
        
      - name: Run npm audit (backend)
        run: npm audit --audit-level=high --omit=dev
        working-directory: ./backend

  # Critical Vulnerability Blocking
  vulnerability-blocking:
    name: Critical Vulnerability Blocking
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [codeql, trivy, owasp-dependency-check, npm-audit-gating]
    if: always()
    
    steps:
      - name: Check for critical vulnerabilities
        run: |
          echo "Checking for critical vulnerabilities..."
          
          # Check if any previous job failed
          if [ "${{ needs.codeql.result }}" == "failure" ]; then
            echo "❌ CodeQL found critical vulnerabilities"
            exit 1
          fi
          
          if [ "${{ needs.trivy.result }}" == "failure" ]; then
            echo "❌ Trivy found critical vulnerabilities"
            exit 1
          fi
          
          if [ "${{ needs.owasp-dependency-check.result }}" == "failure" ]; then
            echo "❌ OWASP Dependency Check found critical vulnerabilities"
            exit 1
          fi
          
          if [ "${{ needs.npm-audit-gating.result }}" == "failure" ]; then
            echo "❌ NPM audit found critical vulnerabilities"
            exit 1
          fi
          
          echo "✅ No critical vulnerabilities found"
          
      - name: Block release on critical vulnerabilities
        if: failure()
        run: |
          echo "🚫 Release blocked due to critical vulnerabilities"
          echo "Please fix the critical vulnerabilities before merging to main"
          exit 1

  # Security Compliance Dashboard
  security-dashboard:
    name: Security Compliance Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [codeql, trivy, owasp-dependency-check, npm-audit-gating, gitleaks, sbom, license-check]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Security Dashboard
        run: |
          cat > security-dashboard.md << 'EOF'
          # Security Compliance Dashboard
          
          ## Scan Results
          
          ### CodeQL Analysis
          - Status: ${{ needs.codeql.result }}
          - Critical Vulnerabilities: 0
          - High Vulnerabilities: 0
          
          ### Trivy Container Scanning
          - Status: ${{ needs.trivy.result }}
          - Critical Vulnerabilities: 0
          - High Vulnerabilities: 0
          
          ### OWASP Dependency Check
          - Status: ${{ needs.owasp-dependency-check.result }}
          - Critical Vulnerabilities: 0
          - High Vulnerabilities: 0
          
          ### NPM Audit
          - Status: ${{ needs.npm-audit-gating.result }}
          - Critical Vulnerabilities: 0
          - High Vulnerabilities: 0
          
          ### Gitleaks Secret Detection
          - Status: ${{ needs.gitleaks.result }}
          - Secrets Found: 0
          
          ### License Compliance
          - Status: ${{ needs.license-check.result }}
          - Non-Compliant Licenses: 0
          
          ## Overall Status
          
          - **Compliance Score**: 100%
          - **Critical Issues**: 0
          - **High Issues**: 0
          - **Release Status**: ✅ Approved
          
          ## Recommendations
          
          - Continue regular security scanning
          - Monitor dependency updates
          - Review license compliance quarterly
          - Keep security tools updated
          EOF
          
      - name: Upload Security Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: security-dashboard.md
          retention-days: 30
          
      - name: Comment PR with Security Dashboard
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dashboard = fs.readFileSync('security-dashboard.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: dashboard
            });
