name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check if secrets are configured
        id: secrets-check
        run: |
          if [ -n "${{ secrets.VITE_SUPABASE_URL }}" ] && [ -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "secrets_status=configured" >> $GITHUB_OUTPUT
          else
            echo "secrets_status=missing" >> $GITHUB_OUTPUT
          fi

      - name: Build for production (with secrets)
        if: steps.secrets-check.outputs.secrets_status == 'configured'
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build for production (without secrets - preview mode)
        if: steps.secrets-check.outputs.secrets_status == 'missing'
        run: |
          echo "Building in preview mode (secrets not configured)..."
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Validate dist output
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found"
            exit 1
          fi
          if [ ! -d "dist/assets" ]; then
            echo "ERROR: dist/assets not found"
            exit 1
          fi
          echo "Build output validated"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30

  smoke-test:
    name: Smoke Test
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/

      - name: Check critical files
        run: |
          echo "Checking critical files..."
          ls -la dist/
          ls -la dist/assets/
          grep -l "react" dist/assets/*.js || true
          echo "Critical file check passed"

  deploy-vercel:
    name: Deploy to Vercel
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: secrets.VERCEL_TOKEN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Project Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Check if secrets are configured
        id: secrets-check
        run: |
          if [ -n "${{ secrets.VITE_SUPABASE_URL }}" ] && [ -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "secrets_status=configured" >> $GITHUB_OUTPUT
          else
            echo "secrets_status=missing" >> $GITHUB_OUTPUT
          fi

      - name: Build Project for Production (with secrets)
        if: steps.secrets-check.outputs.secrets_status == 'configured'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build Project for Production (without secrets)
        if: steps.secrets-check.outputs.secrets_status == 'missing'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Deploy to Vercel (Production)
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
