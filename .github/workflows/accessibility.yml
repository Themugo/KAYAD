name: Accessibility Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 8 AM UTC
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run accessibility audit with Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          urls: |
            http://localhost:3000
          budgetPath: ./.github/lighthouse-budget.json
          configPath: ./.github/lighthouserc.json

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Playwright accessibility tests
        run: npx playwright test e2e/accessibility --config e2e/playwright.config.js

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            e2e/accessibility-report/
            .lighthouseci/

      - name: Comment PR with accessibility findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔍 Accessibility Audit Results\n\n';
            
            // Check if Lighthouse report exists
            try {
              const lighthouseReport = JSON.parse(fs.readFileSync('.lighthouseci/lhr.json', 'utf8'));
              const accessibilityScore = lighthouseReport.categories.accessibility.score * 100;
              comment += `**Lighthouse Accessibility Score**: ${accessibilityScore}/100\n\n`;
              
              const issues = lighthouseReport.audits;
              const criticalIssues = Object.values(issues).filter(a => a.score < 0.5);
              
              if (criticalIssues.length > 0) {
                comment += `### Critical Issues (${criticalIssues.length})\n\n`;
                criticalIssues.forEach(issue => {
                  comment += `- **${issue.title}**: ${issue.description}\n`;
                });
              }
            } catch (error) {
              comment += 'Lighthouse report not available.\n\n';
            }
            
            comment += '\nPlease review the accessibility artifacts for detailed findings.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  axe-scan:
    name: axe-core Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Run axe-core scan
        run: |
          npx @axe-core/cli http://localhost:3000 --exit

      - name: Upload axe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axe-report
          path: axe-report.json

  color-contrast-check:
    name: Color Contrast Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Install color contrast checker
        run: npm install -g pa11y

      - name: Run color contrast check
        run: |
          pa11y http://localhost:3000 --runner axe --threshold 0

      - name: Upload contrast report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contrast-report
          path: pa11y-report.json
