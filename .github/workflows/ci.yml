name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Run lint checks
        run: npm run format:check

      - name: Run backend tests
        id: backend_tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/backend-test.log
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-32-chars-minimum-x
          MPESA_SKIP_IP_CHECK: "true"
          MONGO_URI: mongodb://localhost:27017/kayad-ci

      - name: Surface test failures
        if: failure()
        working-directory: ./backend
        run: |
          {
            echo "## ❌ Backend test failures";
            echo "";
            echo '```';
            grep -nE "✕|●|FAIL |Tests:|Test Suites:|Expected|Received|expect\(|TypeError|ReferenceError|ValidationError|at Object" /tmp/backend-test.log | head -150 || echo "(no matching lines — see raw log)";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run npm audit (root)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (backend)
        run: npm audit --audit-level=moderate
        working-directory: ./backend
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          working-directory: ./backend
