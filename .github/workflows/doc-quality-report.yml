name: Documentation Quality Report

on:
  schedule:
    - cron: '0 0 1 * *' # Monthly on 1st
  workflow_dispatch:

jobs:
  quality-report:
    name: Generate Documentation Quality Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install gray-matter date-fns

      - name: Generate quality report
        run: node scripts/doc-quality-report.js

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: doc-quality-report
          path: doc-quality-report.json
          retention-days: 90

      - name: Comment on issue
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('doc-quality-report.json', 'utf8'));
            const recs = report.recommendations || [];
            const body = '# Documentation Quality Report\n\n' +
              'Generated: ' + report.generated + '\n\n' +
              '## Summary\n' +
              '- Total Documents: ' + report.totalDocuments + '\n' +
              '- Stale Documents: ' + report.staleDocuments + ' (' + report.stalePercentage + '%)' + '\n' +
              '- Documents with Ownership: ' + report.documentsWithOwnership + ' (' + report.ownershipCompliance + '%)' + '\n' +
              '- Broken Links: ' + report.brokenLinks + '\n' +
              '- Review Compliance: ' + report.reviewCompliance + '%\n\n' +
              '## Quality Metrics\n' +
              '- Overall Score: ' + report.overallScore + '/100\n' +
              '- Readability Score: ' + report.readabilityScore + '/100\n' +
              '- Completeness Score: ' + report.completenessScore + '/100\n\n' +
              '## Recommendations\n' +
              recs.map(function(r) { return '- ' + r; }).join('\n');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Documentation Quality Report',
              body: body,
              labels: ['documentation', 'quality-report']
            });
