name: API Contract Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'backend/controllers/**'
      - 'backend/validation/**'
      - 'backend/config/swagger.js'
  pull_request:
    branches: [main]
    paths:
      - 'backend/routes/**'
      - 'backend/controllers/**'
      - 'backend/validation/**'
      - 'backend/config/swagger.js'

jobs:
  contract-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: |
          cd backend
          npm ci
          
      - name: Validate OpenAPI spec
        run: |
          cd backend
          npx swagger-cli validate config/swagger.js
          
      - name: Generate OpenAPI JSON
        run: |
          cd backend
          node -e "const { swaggerSpec } = require('./config/swagger.js'); const fs = require('fs'); fs.writeFileSync('openapi.json', JSON.stringify(swaggerSpec, null, 2));"
          
      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: backend/openapi.json
          
      - name: Run contract tests
        run: |
          cd backend
          npm test -- test/contract/
