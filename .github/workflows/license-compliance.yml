name: License Compliance Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'

jobs:
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        component:
          - backend
          - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.component == 'backend' && 'backend' || '.' }}

      - name: Install License Checker
        run: npm install -g license-checker

      - name: Run license check for ${{ matrix.component }}
        run: |
          cd ${{ matrix.component == 'backend' && 'backend' || '.' }}
          license-checker --production --json --out ../license-report-${{ matrix.component }}.json

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ matrix.component }}
          path: license-report-${{ matrix.component }}.json

      - name: Check for non-compliant licenses
        run: |
          node -e "
            var fs = require('fs');
            var report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
            var disallowedPatterns = ['AGPL', 'CPL', 'EPL', 'SSPL', 'CPAL'];
            var disallowed = [];
            Object.keys(report).forEach(function(name) {
              var pkg = report[name];
              var licenses = pkg.licenses;
              if (typeof licenses === 'string') { licenses = [licenses]; }
              if (!licenses || !Array.isArray(licenses)) { return; }
              licenses.forEach(function(license) {
                disallowedPatterns.forEach(function(pattern) {
                  if (license.indexOf(pattern) !== -1) {
                    disallowed.push({ package: name, license: license });
                  }
                });
              });
            });
            if (disallowed.length > 0) {
              console.log('Disallowed licenses found:');
              disallowed.forEach(function(d) { console.log('  - ' + d.package + ': ' + d.license); });
              process.exit(1);
            } else {
              console.log('All licenses are compliant.');
            }
          "

      - name: Generate license summary
        if: always()
        run: |
          node -e "
            var fs = require('fs');
            var report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
            var licenseSummary = {};
            Object.keys(report).forEach(function(name) {
              var pkg = report[name];
              var licenses = pkg.licenses;
              if (typeof licenses === 'string') { licenses = [licenses]; }
              if (!licenses || !Array.isArray(licenses)) { return; }
              licenses.forEach(function(license) {
                licenseSummary[license] = (licenseSummary[license] || 0) + 1;
              });
            });
            console.log('License Summary for ${{ matrix.component }}:');
            Object.keys(licenseSummary).forEach(function(license) {
              console.log('  ' + license + ': ' + licenseSummary[license]);
            });
          "

      - name: Comment PR with license findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
              const licenseSummary = {};
              Object.keys(report).forEach(function(name) {
                const pkg = report[name];
                const licenses = pkg.licenses;
                if (typeof licenses === 'string') { return; }
                if (!licenses || !Array.isArray(licenses)) { return; }
                licenses.forEach(function(license) {
                  licenseSummary[license] = (licenseSummary[license] || 0) + 1;
                });
              });
              const summary = Object.keys(licenseSummary).map(function(l) { return l + ': ' + licenseSummary[l]; }).join('\n');
              const comment = '## License Compliance - ${{ matrix.component }}\n\n```\n' + summary + '\n```\n\nAll licenses are compliant with the allowed license policy.';
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Error reading license report:', error);
            }
