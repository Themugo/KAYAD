name: License Compliance Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'

jobs:
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        component:
          - backend
          - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            cd backend
            npm ci
          else
            pnpm install --frozen-lockfile
          fi

      - name: Install License Checker
        run: npm install -g license-checker

      - name: Run license check for ${{ matrix.component }}
        run: |
          if [ "${{ matrix.component }}" = "backend" ]; then
            cd backend
            license-checker --production --json --out ../license-report-${{ matrix.component }}.json
          else
            license-checker --production --json --out license-report-${{ matrix.component }}.json
          fi

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report-${{ matrix.component }}
          path: license-report-${{ matrix.component }}.json

      - name: Check for non-compliant licenses
        run: |
          # Define allowed licenses
          ALLOWED_LICENSES=(
            "MIT"
            "Apache-2.0"
            "BSD-2-Clause"
            "BSD-3-Clause"
            "ISC"
            "0BSD"
            "CC0-1.0"
            "Unlicense"
            "WTFPL"
          )
          
          # Check for disallowed licenses
          DISALLOWED_LICENSES=(
            "GPL"
            "AGPL"
            "LGPL"
            "MPL"
            "CPL"
            "EPL"
            "SSPL"
            "CPAL"
          )
          
          # Parse license report
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
            const disallowed = [];
            const allowed = ['MIT', 'Apache-2.0', 'BSD-2-Clause', 'BSD-3-Clause', 'ISC', '0BSD', 'CC0-1.0', 'Unlicense', 'WTFPL'];
            const disallowedPatterns = ['GPL', 'AGPL', 'LGPL', 'MPL', 'CPL', 'EPL', 'SSPL', 'CPAL'];
            
            report.forEach(pkg => {
              const licenses = pkg.licenses || [];
              licenses.forEach(license => {
                if (disallowedPatterns.some(pattern => license.includes(pattern))) {
                  disallowed.push({ package: pkg.name, license: license });
                }
              });
            });
            
            if (disallowed.length > 0) {
              console.log('Disallowed licenses found:');
              disallowed.forEach(d => console.log(\`  - \${d.package}: \${d.license}\`));
              process.exit(1);
            } else {
              console.log('All licenses are compliant.');
            }
          "

      - name: Generate license summary
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
            
            const licenseSummary = {};
            report.forEach(pkg => {
              const licenses = pkg.licenses || ['Unknown'];
              licenses.forEach(license => {
                licenseSummary[license] = (licenseSummary[license] || 0) + 1;
              });
            });
            
            console.log('License Summary for ${{ matrix.component }}:');
            Object.entries(licenseSummary).forEach(([license, count]) => {
              console.log(\`  \${license}: \${count}\`);
            });
          "

      - name: Comment PR with license findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('license-report-${{ matrix.component }}.json', 'utf8'));
              
              const licenseSummary = {};
              report.forEach(pkg => {
                const licenses = pkg.licenses || ['Unknown'];
                licenses.forEach(license => {
                  licenseSummary[license] = (licenseSummary[license] || 0) + 1;
                });
              });
              
              const summary = Object.entries(licenseSummary)
                .map(([license, count]) => `${license}: ${count}`)
                .join('\n');
              
              const comment = `## 📜 License Compliance - ${{ matrix.component }}\n\n\`\`\`\n${summary}\n\`\`\`\n\nAll licenses are compliant with the allowed license policy.`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Error reading license report:', error);
            }
