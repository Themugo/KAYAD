name: Deploy Gate

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: Deployment environment
    outputs:
      passed:
        description: Whether deployment succeeded
        value: ${{ jobs.deploy.outputs.passed }}

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Deploy to Vercel (Frontend)
        if: inputs.environment == 'production' || inputs.environment == 'preview'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ inputs.environment == 'preview' && '--preview' || '--prod' }}

      - name: Deploy to Production Server (Backend)
        if: inputs.environment == 'production'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/kayad/backend
            git pull origin main
            npm ci --omit=dev
            bash scripts/backup.sh
            pm2 reload ecosystem.config.cjs --update-env
            pm2 status

      - name: Verify deployment
        if: inputs.environment == 'production'
        run: |
          curl -f https://api.kayad.space/health || exit 1
          curl -f https://api.kayad.space/health/deep || exit 1

      - name: Mark as passed
        id: check
        run: echo "passed=true" >> $GITHUB_OUTPUT
