name: Tenant Isolation Audit

on:
  schedule:
    # Run weekly on Sundays at 11 AM UTC
    - cron: '0 11 * * 0'
  workflow_dispatch:

jobs:
  tenant-isolation-audit:
    name: Tenant Isolation Compliance Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run tenant isolation audit
        run: |
          cd backend
          node scripts/generateTenantIsolationReport.js

      - name: Run tenant isolation tests
        run: |
          cd backend
          npm test -- tenantIsolation.test.js

      - name: Upload tenant isolation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tenant-isolation-report
          path: |
            backend/tenant-isolation-report.json
            backend/tenant-isolation-report.md

      - name: Comment PR with tenant isolation findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('backend/tenant-isolation-report.json', 'utf8'));
              
              let comment = '## 🔒 Tenant Isolation Audit Results\n\n';
              comment += `**Overall Score**: ${report.summary.overall.score}%\n`;
              comment += `**Overall Status**: ${report.summary.overall.passed ? '✅ PASS' : '❌ FAIL'}\n\n`;
              
              comment += '### Category Results\n\n';
              comment += '| Category | Status |\n';
              comment += '|----------|--------|\n';
              comment += `| Data Access Boundaries | ${report.summary.dataAccessBoundaries ? '✅' : '❌'} |\n`;
              comment += `| RBAC | ${report.summary.rbac ? '✅' : '❌'} |\n`;
              comment += `| Audit Logging | ${report.summary.auditLogging ? '✅' : '❌'} |\n`;
              comment += `| Cache Isolation | ${report.summary.cacheIsolation ? '✅' : '❌'} |\n`;
              comment += `| Search Isolation | ${report.summary.searchIsolation ? '✅' : '❌'} |\n\n`;
              
              if (!report.summary.overall.passed) {
                comment += '⚠️ **Action Required**: Some tenant isolation checks failed. Please review the detailed report and address the findings.';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Error reading report:', error);
            }

      - name: Create GitHub Issue for compliance report
        if: github.event_name == 'schedule' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('backend/tenant-isolation-report.json', 'utf8'));
              const markdown = fs.readFileSync('backend/tenant-isolation-report.md', 'utf8');
              
              const title = `Tenant Isolation Compliance Report - ${new Date().toISOString().split('T')[0]}`;
              
              // Check if issue already exists
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'tenant-isolation'
              });
              
              if (issues.data.length > 0) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issues.data[0].number,
                  body: markdown
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: markdown,
                  labels: ['tenant-isolation', 'compliance']
                });
              }
            } catch (error) {
              console.log('Error creating issue:', error);
            }
