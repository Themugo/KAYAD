name: Trivy Container Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 4 AM UTC
    - cron: '0 4 * * *'

jobs:
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        target:
          - backend
          - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "backend" ]; then
            docker build -t kayad-backend:latest ./backend
          else
            docker build -t kayad-frontend:latest .
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kayad-${{ matrix.target }}:latest
          format: 'sarif'
          output: 'trivy-results-${{ matrix.target }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          vuln-type: 'os,library'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.target }}.sarif'
          category: trivy-${{ matrix.target }}

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ matrix.target }}
          path: trivy-results-${{ matrix.target }}.sarif

      - name: Generate Trivy report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kayad-${{ matrix.target }}:latest
          format: 'json'
          output: 'trivy-report-${{ matrix.target }}.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      - name: Upload Trivy JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.target }}
          path: trivy-report-${{ matrix.target }}.json

      - name: Comment PR with findings
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = JSON.parse(fs.readFileSync('trivy-report-${{ matrix.target }}.json', 'utf8'));
              const critical = report.Results?.[0]?.Vulnerabilities?.filter(v => v.Severity === 'CRITICAL')?.length || 0;
              const high = report.Results?.[0]?.Vulnerabilities?.filter(v => v.Severity === 'HIGH')?.length || 0;
              
              if (critical > 0 || high > 0) {
                const comment = `## 🐋 Trivy Container Scan Results - ${{ matrix.target }}\n\n**Critical**: ${critical}\n**High**: ${high}\n\n${critical > 0 ? '⚠️ Critical vulnerabilities found. Please fix before merging.' : ''}`;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (error) {
              console.log('No vulnerabilities found or error reading report');
            }
