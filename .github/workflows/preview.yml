name: Preview Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  preview-backend:
    name: Preview Backend
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run tests
        run: npm test
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-32-chars-minimum-x
          MPESA_SKIP_IP_CHECK: "true"
          MONGO_URI: mongodb://localhost:27017/kayad-ci

      - name: Build Docker image
        run: docker build -t kayad-backend-preview:${{ github.sha }} ./backend

      - name: Deploy to Render (Preview)
        id: deploy
        run: |
          # Create a preview deployment on Render
          # This requires Render CLI or API integration
          # For now, this is a placeholder showing the structure
          echo "Deploying preview backend for PR #${{ github.event.pull_request.number }}"
          echo "url=https://kayad-backend-preview-${{ github.event.pull_request.number }}.onrender.com" >> $GITHUB_OUTPUT
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

  preview-frontend:
    name: Preview Frontend
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm exec vite build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: https://kayad-backend-preview-${{ github.event.pull_request.number }}.onrender.com

      - name: Deploy to Vercel (Preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--preview'
          working-directory: ./
