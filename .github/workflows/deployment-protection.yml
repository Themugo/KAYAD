name: Deployment Protection

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pre-deploy-validation:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Run type check
        run: npm run typecheck
      
      - name: Run pre-deploy checks
        run: node scripts/pre-deploy-check.js || echo "No pre-deploy-check script"
      
      - name: Run deployment validation
        run: npm run pre-deploy || echo "No validate-deployment script"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
      
      - name: Build test
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}

  deployment-block:
    name: Deployment Block
    runs-on: ubuntu-latest
    needs: [pre-deploy-validation, security-scan]
    if: failure()
    
    steps:
      - name: Block deployment
        run: |
          echo "❌ DEPLOYMENT BLOCKED"
          echo "Pre-deploy validation or security scan failed."
          echo "Please fix the issues before deploying."
          exit 1
