name: Dependency Health Check

on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday at 00:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      
      - name: Audit Frontend
        run: npm audit --audit-level=moderate --omit=dev
      
      - name: Audit Backend
        run: cd backend && npm audit --audit-level=moderate --omit=dev
      
      - name: Check Outdated Frontend
        run: npm outdated || echo "No outdated packages"
      
      - name: Check Outdated Backend
        run: cd backend && npm outdated || echo "No outdated packages"
      
      - name: Run Dependency Health Script
        run: bash scripts/dependency-health.sh
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Add logic to comment on PR with audit results
