name: Documentation Link Check

on:
  pull_request:
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday
  workflow_dispatch:

jobs:
  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.github/link-check-config.json'
          check-modified-files-only: 'no'
          base-branch: 'main'
          folder-path: './'
          file-extension: '.md'
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'

      - name: Create issue for broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Broken Links Found in Documentation',
              body: 'The markdown link check found broken links. Please review the workflow logs for details.',
              labels: ['documentation', 'broken-links']
            })
