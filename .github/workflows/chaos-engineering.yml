name: Chaos Engineering

on:
  schedule:
    # Run weekly on Sundays at 10 AM UTC
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      experiment:
        description: 'Chaos experiment to run'
        required: true
        type: choice
        options:
          - all
          - database
          - cache
          - queue
          - payment
          - notification
      duration:
        description: 'Duration of outage simulation (ms)'
        required: false
        type: number
        default: 30000
      severity:
        description: 'Severity of outage'
        required: false
        type: choice
        options:
          - partial
          - full
        default: partial

jobs:
  chaos-experiment:
    name: Run Chaos Experiment
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run chaos experiment
        run: |
          cd backend
          node chaos/runChaosExperiment.js ${{ inputs.experiment || 'all' }} ${{ inputs.duration || 30000 }} ${{ inputs.severity || 'partial' }}

      - name: Generate resilience scorecard
        run: |
          cd backend
          node chaos/generateScorecard.js

      - name: Upload resilience scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resilience-scorecard
          path: backend/resilience-scorecard.json

      - name: Comment PR with resilience scorecard
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const scorecard = JSON.parse(fs.readFileSync('backend/resilience-scorecard.json', 'utf8'));
              
              let comment = '## 🔥 Chaos Engineering Results\n\n';
              comment += `**Experiment**: ${{ inputs.experiment || 'all' }}\n`;
              comment += `**Duration**: ${{ inputs.duration || 30000 }}ms\n`;
              comment += `**Severity**: ${{ inputs.severity || 'partial' }}\n\n`;
              
              comment += '### Resilience Scorecard\n\n';
              comment += '| Component | Retry | Circuit Breaker | Failover | Overall |\n';
              comment += '|-----------|-------|----------------|----------|--------|\n';
              
              for (const [component, score] of Object.entries(scorecard)) {
                comment += `| ${component} | ${score.retry ? '✅' : '❌'} | ${score.circuitBreaker ? '✅' : '❌'} | ${score.failover ? '✅' : '❌'} | ${score.overall ? '✅' : '❌'} |\n`;
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Error reading scorecard:', error);
            }

      - name: Create GitHub Issue for resilience report
        if: github.event_name == 'schedule' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const scorecard = JSON.parse(fs.readFileSync('backend/resilience-scorecard.json', 'utf8'));
              
              let body = '# Resilience Scorecard\n\n';
              body += `**Date**: ${new Date().toISOString()}\n\n`;
              body += '### Component Scores\n\n';
              body += '| Component | Retry | Circuit Breaker | Failover | Overall |\n';
              body += '|-----------|-------|----------------|----------|--------|\n';
              
              for (const [component, score] of Object.entries(scorecard)) {
                body += `| ${component} | ${score.retry ? '✅' : '❌'} | ${score.circuitBreaker ? '✅' : '❌'} | ${score.failover ? '✅' : '❌'} | ${score.overall ? '✅' : '❌'} |\n';
              }
              
              const title = `Resilience Scorecard - ${new Date().toISOString().split('T')[0]}`;
              
              // Check if issue already exists
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'resilience-scorecard'
              });
              
              if (issues.data.length > 0) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issues.data[0].number,
                  body: body
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: title,
                  body: body,
                  labels: ['resilience-scorecard']
                });
              }
            } catch (error) {
              console.log('Error creating issue:', error);
            }
