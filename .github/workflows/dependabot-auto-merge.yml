name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-Merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
      - name: Wait for CI checks
        id: wait-ci
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get the PR details
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            
            // Check if PR is mergeable
            if (pr.mergeable !== true) {
              console.log('PR is not mergeable (conflicts or other issues)');
              process.exit(1);
            }
            
            // Get the combined status
            const { data: status } = await github.rest.repos.getCombinedStatus({
              owner,
              repo,
              ref: pr.head.sha,
            });
            
            console.log('Combined status:', status.state);
            console.log('Statuses:', status.statuses.map(s => `${s.context}: ${s.state}`).join(', '));
            
            // For Dependabot PRs, we wait for the checks to complete
            // The status will be 'success', 'failure', or 'pending'
            if (status.state === 'success') {
              console.log('All checks passed!');
            } else if (status.state === 'failure') {
              console.log('Some checks failed, cannot auto-merge');
              process.exit(1);
            } else {
              console.log('Checks still pending...');
              process.exit(1);
            }
            
      - name: Enable auto-merge
        if: steps.wait-ci.conclusion == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            
            // Enable auto-merge using GraphQL
            try {
              await github.graphql(`
                mutation enableAutoMerge($prId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $prId
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `, {
                prId: pr.node_id
              });
              console.log('Auto-merge enabled successfully via GraphQL!');
            } catch (error) {
              console.log('GraphQL mutation failed:', error.message);
              // Fallback: try direct merge
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  commit_title: pr.title
                });
                console.log('PR merged directly!');
              } catch (mergeError) {
                console.log('Direct merge failed:', mergeError.message);
                process.exit(1);
              }
            }
