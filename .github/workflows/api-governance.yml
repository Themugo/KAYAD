name: API Governance Check

on:
  workflow_call:
  workflow_dispatch:

jobs:
  api-governance:
    name: API Contract Enforcement
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run API governance check
        run: node scripts/api-governance-check.js

      - name: Upload governance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-governance-report
          path: api-governance-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('api-governance-report.json', 'utf8'));
            } catch (e) {
              console.log('No report found');
              return;
            }
            
            const summary = report.summary;
            const compliance = report.compliance;
            var actionMsg = '### Action Required\n\nThis PR fails API governance compliance. Please add OpenAPI documentation and/or validation middleware to the affected endpoints.';
            if (compliance.documentation && compliance.validation) {
              actionMsg = '### All Checks Passed';
            }
            var body = '## API Governance Report\n\n' +
              '**Generated**: ' + report.generated + '\n\n' +
              '### Summary\n' +
              '- **Total Routes**: ' + summary.totalRoutes + '\n' +
              '- **Documented Routes**: ' + summary.documentedRoutes + ' (' + summary.documentationCoverage + '%)' + '\n' +
              '- **Routes with Validation**: ' + summary.routesWithValidation + ' (' + summary.validationCoverage + '%)' + '\n' +
              '- **Undocumented Routes**: ' + summary.undocumentedRoutes + '\n' +
              '- **Routes Without Validation**: ' + summary.routesWithoutValidation + '\n\n' +
              '### Compliance Status\n' +
              '- **Documentation**: ' + (compliance.documentation ? 'PASS' : 'FAIL') + ' (Target: 80%)\n' +
              '- **Validation**: ' + (compliance.validation ? 'PASS' : 'FAIL') + ' (Target: 80%)\n\n' +
              actionMsg + '\n\n' +
              '### Details\nSee the uploaded artifact for detailed route analysis.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail CI if compliance fails
        if: failure()
        run: |
          echo "❌ API Governance Compliance Failed"
          echo "Please add OpenAPI documentation and validation middleware to undocumented endpoints."
          exit 1
