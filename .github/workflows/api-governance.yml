name: API Governance Check

on:
  pull_request:
    paths:
      - 'backend/routes/**'
      - 'backend/controllers/**'
      - 'backend/middleware/**'
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  api-governance:
    name: API Contract Enforcement
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run API governance check
        run: node scripts/api-governance-check.js

      - name: Upload governance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-governance-report
          path: api-governance-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('api-governance-report.json', 'utf8'));
            } catch (e) {
              console.log('No report found');
              return;
            }
            
            const { summary, compliance } = report;
            
            const body = `## API Governance Report
            
**Generated**: ${report.generated}

### Summary
- **Total Routes**: ${summary.totalRoutes}
- **Documented Routes**: ${summary.documentedRoutes} (${summary.documentationCoverage}%)
- **Routes with Validation**: ${summary.routesWithValidation} (${summary.validationCoverage}%)
- **Undocumented Routes**: ${summary.undocumentedRoutes}
- **Routes Without Validation**: ${summary.routesWithoutValidation}

### Compliance Status
- **Documentation**: ${compliance.documentation ? '✅ PASS' : '❌ FAIL'} (Target: 80%)
- **Validation**: ${compliance.validation ? '✅ PASS' : '❌ FAIL'} (Target: 80%)

${!compliance.documentation || !compliance.validation ? 
'### Action Required\n\nThis PR fails API governance compliance. Please add OpenAPI documentation and/or validation middleware to the affected endpoints.' : 
'### ✅ All Checks Passed'}

### Details
See the uploaded artifact for detailed route analysis.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail CI if compliance fails
        if: failure()
        run: |
          echo "❌ API Governance Compliance Failed"
          echo "Please add OpenAPI documentation and validation middleware to undocumented endpoints."
          exit 1
