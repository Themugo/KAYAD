    task: "Merge GlobalSettings + PlatformConfig into PlatformConfig"
    risk: LOW — config-only, no runtime impact
    files_affected: 2 models, 1 service

  - priority: 2
    task: "Unify commission rate source of truth to PlatformConfig.commissionRate"
    risk: LOW — config read change only
    files_affected: feeService.js, escrowService.js, paymentService.js

  - priority: 3
    task: "Merge pushNotificationService.js → notificationService.js"
    risk: MEDIUM — event dispatch paths change
    files_affected: 2 services, update imports in 12+ files

  - priority: 4
    task: "Merge fraudScoringService.js → fraudDetectionService.js"
    risk: MEDIUM — scoring algorithm consolidation
    files_affected: 2 services

  - priority: 5
    task: "Merge VehicleValuation pricing into carService (or new pricingService.js)"
    risk: MEDIUM — API contract change for /api/valuation
    files_affected: 2-3 services, 1-2 routes

  - priority: 6
    task: "Create reputationService.js from dealerTrust + listingQuality + fraud risk"
    risk: HIGH — touches 3 services, 4+ controllers
    files_affected: 3 services, rewrite scoring

  - priority: 7
    task: "Merge recommendationEngine.js → recommendationService.js"
    risk: LOW — both are internal
    files_affected: 2 services

  - priority: 8
    task: "Merge cacheWarmupService.js → cacheService.js"
    risk: LOW — infra only
    files_affected: 2 services

  - priority: 9
    task: "Break circular dependency chains (extract shared logic)"
    risk: HIGH — requires new intermediate services/events
    files_affected: 8+ services, event bus or middleware layer
