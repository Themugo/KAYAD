# render.yaml — Kayad Backend
# Deploy on Render: Connect GitHub repo → Render auto-detects this file

services:
  - type: web
    name: kayad-backend
    env: node
    region: oregon
    plan: standard
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /health/live
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /app/backend/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: SESSION_SECRET
        sync: false
      - key: CUSTOM_DOMAIN
        value: "kayad.space"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://kayad.space
      - key: EXTRA_CORS_ORIGINS
        sync: false
      - key: WEBHOIST_EMAIL
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: MPESA_ENV
        value: production
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.kayad.space/api/payments/callback
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: REDIS_URL
        sync: false
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: notifications@kayad.space
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: ESCROW_ACCOUNT_NUMBER
        sync: false
      - key: ESCROW_BANK_NAME
        value: Equity Bank Kenya
      - key: ADMIN_EMAIL
        value: admin@kayad.space
      - key: ADMIN_PHONE
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: APP_VERSION
        value: 2.0.0
      - key: APP_NAME
        value: Kayad
