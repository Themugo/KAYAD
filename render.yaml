# render.yaml — KAYAD Backend
# Deploy on Render: Connect GitHub repo → Render auto-detects this file

services:
  - type: web
    name: kayad-backend
    region: oregon
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerCommand: []
    dockerContext: ./
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /app/backend/uploads
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WEBHOIST_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
